<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./image/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./image/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./image/favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="./image/favicon_io/site.webmanifest" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body class="body" style="position: relative">
    <div class="modal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Welcome to NGG</h5>
            <button
              type="button"
              class="btn-close closed"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <label for="player-name" class="col-form-label"
              >Enter Your Name:</label
            >
            <input
              type="text"
              class="form-control fw-bold name-input"
              id="player-name"
              autocomplete="off"
            />
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary closed getname">
              Save
            </button>
          </div>
        </div>
      </div>
    </div>
    <audio class="loser-sound" src="./voice/MediaBaz.net-Game - 02.mp3"></audio>
    <audio
      class="Winner"
      src="./voice/ta-da-brass-ensemble-fast-soundroll-1-00-01.mp3"
    ></audio>
    <div class="d-flex justify-content-center mt-2 gap-2 text-primary">
      <p class="full-brand">Number</p>
      <p class="full-brand">Gussing</p>
      <p class="full-brand">Game</p>
    </div>
    <h1 class="stands">(NGG)</h1>
    <p id="rule-para" class="text-center">
      <em>You should choose a number between 1 to 100</em>
    </p>
    <div id="input-container" class="form row text-center">
      <label for="guess-field"><ins>Enter Your Number</ins></label>
      <input
        type="number"
        id="guess-field"
        class="mt-2 form-control"
        style="text-align: center"
      />
      <input
        type="submit"
        id="subField"
        value="Submit"
        class="btn btn-outline-success mt-3 guessSubmit"
        accesskey="c"
        onclick="checkGeuss()"
      />
    </div>
    <br />
    <!-- for showing result -->
    <div class="para-container">
      <p id="guess-history"></p>
      <p id="guess-count-text"></p>
      <p id="result-teller"></p>
    </div>
    <div class="reset">
      <button id="reset-btn" onclick="reset()">Try Again!</button>
    </div>
    <h3>made by Pouyan</h3>
    <div class="game-info">
      <p>Games Played: <span class="games-counter-span"></span></p>
      <p>Correct Guess: <span class="correct-gusses-span"></span></p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
